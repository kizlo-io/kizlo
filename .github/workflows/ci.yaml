name: CI

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest
      - name: Run Biome
        run: biome ci .

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./tooling/gh-actions/setup

      - name: Typecheck (TS + PHP)
        run: pnpm run typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./tooling/gh-actions/setup

      - name: Setup environment for CI
        shell: bash
        run: cp .env.example .env

      - name: Build
        run: pnpm build

      - name: Boot + seed WordPress stack + run tests
        run: pnpm kizlo test

      - name: Print docker logs on failure
        if: failure()
        run: docker compose -f packages/kizlo/src/cli/wp/compose/docker-compose.yml logs --tail=200

      - name: Stop WordPress stack
        if: always()
        run: pnpm kizlo test stop
