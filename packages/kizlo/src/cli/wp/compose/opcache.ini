; Kizlo dev — PHP OPcache tuned for local development.
;
; OPcache keeps compiled PHP bytecode in memory, so WordPress skips re-reading and
; recompiling its hundreds of files on every request — the single biggest speedup
; when the install is bind-mounted from the host.
;
; validate_timestamps=1 (with revalidate_freq=0) makes OPcache re-check each file's
; mtime every request, so live edits from a bind mount show up immediately. Never
; set this to 0 in dev or your changes will appear "stuck" behind a stale cache.
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.validate_timestamps=1
opcache.revalidate_freq=0
