name: kizlo-wp-test

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wppass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -uroot
        - -p${MYSQL_ROOT_PASSWORD:-rootpass}
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  wordpress:
    image: wordpress:latest
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${WP_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wppass}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_ENVIRONMENT_TYPE', 'local');
    volumes:
      - wp_data:/var/www/html
    healthcheck:
      # wp-login.php always returns 200 unauthenticated; /wp-json can be gated to 401
      # by plugins, so it's not a reliable liveness probe.
      test: ["CMD-SHELL", "curl -sf http://localhost/wp-login.php > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  wp-cli:
    image: wordpress:cli
    depends_on:
      wordpress:
        condition: service_healthy
    user: "33:33"
    volumes:
      - wp_data:/var/www/html
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wppass}
      HOME: /tmp
      WP_CLI_CACHE_DIR: /tmp/wp-cli-cache
    # Kept warm (long-lived) so the harness can `docker compose exec wp-cli wp ...`
    # instead of paying container-startup cost on every wp-cli call.
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  mysql_data:
  wp_data:
